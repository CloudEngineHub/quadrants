name: Benchmarks

on:
  workflow_run:
    workflows: ["Manylinux wheel build"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-cuda:
    name: Interop benchmarks (CUDA)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: gpu-t4-4-core
    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install CUDA libraries
        run: |
          sudo apt-get install -y libcusolver-dev-12-8 libcusolver-12-8 \
            libcusparse-dev-12-8 libcusparse-12-8 libnvjitlink-12-8 libcublas-12-8
          echo "/usr/local/cuda/targets/x86_64-linux/lib" | sudo tee /etc/ld.so.conf.d/cuda-targets.conf
          sudo ldconfig
      - name: Download manylinux wheel
        uses: actions/download-artifact@v4
        with:
          name: manylinux_wheel_cp310_ubuntu-22.04
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install quadrants + torch
        run: |
          set -ex
          mkdir -p dist && mv *.whl dist/
          pip install dist/*.whl
          pip install torch --index-url https://download.pytorch.org/whl/cu128
          pip install wandb
      - name: Run benchmarks
        run: |
          pytest tests/python/test_interop_benchmarks.py \
            -v -s -k cuda -m benchmarks \
            --bench-out /tmp/bench_cuda.txt
      - name: Upload results to W&B
        if: >
          github.repository == 'Genesis-Embodied-AI/gstaichi'
          && github.event.workflow_run.head_branch == 'main'
          && env.WANDB_API_KEY != ''
        run: |
          cat /tmp/bench_cuda*.txt > /tmp/bench_cuda_all.txt
          python tests/python/upload_bench_to_wandb.py \
            --in-file /tmp/bench_cuda_all.txt \
            --project quadrants-interop-benchmarks \
            --metrics steps_per_sec us_per_step \
            --run-prefix cuda
      - name: Display results
        run: cat /tmp/bench_cuda*.txt
      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-cuda
          path: /tmp/bench_cuda*.txt

  benchmark-cpu:
    name: Interop benchmarks (CPU)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-22.04
    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Download manylinux wheel
        uses: actions/download-artifact@v4
        with:
          name: manylinux_wheel_cp310_ubuntu-22.04
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install quadrants + torch
        run: |
          set -ex
          mkdir -p dist && mv *.whl dist/
          pip install dist/*.whl
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install wandb
      - name: Run benchmarks
        run: |
          pytest tests/python/test_interop_benchmarks.py \
            -v -s -k cpu -m benchmarks \
            --bench-out /tmp/bench_cpu.txt
      - name: Upload results to W&B
        if: >
          github.repository == 'Genesis-Embodied-AI/gstaichi'
          && github.event.workflow_run.head_branch == 'main'
          && env.WANDB_API_KEY != ''
        run: |
          cat /tmp/bench_cpu*.txt > /tmp/bench_cpu_all.txt
          python tests/python/upload_bench_to_wandb.py \
            --in-file /tmp/bench_cpu_all.txt \
            --project quadrants-interop-benchmarks \
            --metrics steps_per_sec us_per_step \
            --run-prefix cpu
      - name: Display results
        run: cat /tmp/bench_cpu*.txt
      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-cpu
          path: /tmp/bench_cpu*.txt

  launch-overhead:
    name: Launch overhead (CPU)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-22.04
    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Download manylinux wheel
        uses: actions/download-artifact@v4
        with:
          name: manylinux_wheel_cp310_ubuntu-22.04
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install quadrants + torch
        run: |
          set -ex
          mkdir -p dist && mv *.whl dist/
          pip install dist/*.whl
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install 'wandb<0.25' pytest
      - name: Run launch-overhead benchmarks
        run: |
          mkdir -p /tmp/artifacts
          pytest tests/python/test_launch_overhead.py \
            -m benchmarks -v -s \
            --speed-test-filepath /tmp/artifacts/speed_test_launch.txt
      - name: Display results
        if: always()
        run: cat /tmp/artifacts/speed_test_launch.txt || true
      - name: Upload to W&B (main only)
        if: github.event.workflow_run.head_branch == 'main' && env.WANDB_API_KEY != ''
        run: |
          python .github/workflows/scripts/upload_launch_benchmarks_to_wandb.py \
            --in-file /tmp/artifacts/speed_test_launch.txt \
            --project quadrants-benchmarks \
            --run-prefix launch
      - name: Upload results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: speed-test-launch
          path: /tmp/artifacts/speed_test_launch.txt
