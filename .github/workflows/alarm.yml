name: Benchmark Alarm

on:
  workflow_run:
    workflows: ["Launch Overhead Benchmarks"]
    types: [completed]

permissions:
  contents: read
  actions: read
  pull-requests: write
  checks: write

jobs:
  check-regression:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      contains(fromJson('["success","neutral"]'), github.event.workflow_run.conclusion)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: python -m pip install --quiet --upgrade 'wandb<0.25'

      - name: Download benchmark artifacts
        id: dl
        uses: actions/download-artifact@v4
        with:
          pattern: speed-test-*
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./artifacts

      - name: Show downloaded files
        run: |
          echo "Downloaded into ${{ steps.dl.outputs.download-path }}"
          ls -laR ${{ steps.dl.outputs.download-path }} || true

      - name: Check regressions
        id: analyze
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_SILENT: "true"
        run: |
          mkdir -p /tmp
          set +e
          python .github/workflows/scripts/alarm.py \
            --artifacts-dir ${{ steps.dl.outputs.download-path }} \
            --max-valid-revisions 5 \
            --max-fetch-revisions 30 \
            --tolerance-pct 10 \
            --check-body-path /tmp/check_output.md \
            --exit-code-regression 42 \
            --exit-code-alert 43
          EXIT_CODE=$?
          set -e
          if [ -f /tmp/check_output.md ]; then
            {
              echo 'CHECK_OUTPUT<<__EOF__'
              cat /tmp/check_output.md
              echo '__EOF__'
            } >> "$GITHUB_ENV"
          else
            echo "CHECK_OUTPUT=" >> "$GITHUB_ENV"
          fi
          echo "HAS_REGRESSIONS=$([ "$EXIT_CODE" = 42 ] && echo 1 || echo 0)" >> "$GITHUB_ENV"
          echo "HAS_ALERTS=$([ "$EXIT_CODE" = 43 ] && echo 1 || echo 0)" >> "$GITHUB_ENV"

      - name: Publish PR check
        id: publish_check
        uses: actions/github-script@v8
        env:
          CHECK_NAME: Launch Overhead Comparison
          CHECK_OUTPUT: ${{ env.CHECK_OUTPUT }}
          HAS_REGRESSIONS: ${{ env.HAS_REGRESSIONS }}
          HAS_ALERTS: ${{ env.HAS_ALERTS }}
        with:
          script: |
            let body = process.env.CHECK_OUTPUT || '';
            let summary;
            let conclusion = 'success';
            if ((process.env.HAS_REGRESSIONS || '0') === '1') {
              summary = 'Regressions detected in launch overhead. See tables below.';
              conclusion = 'failure';
            } else if ((process.env.HAS_ALERTS || '0') === '1') {
              summary = 'Large deviation detected in launch overhead. See tables below.';
            } else {
              summary = 'No regressions detected in launch overhead. See tables below.';
            }
            const check = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: context.payload.workflow_run.head_sha,
              name: process.env.CHECK_NAME,
              status: 'completed',
              conclusion: conclusion,
              output: {
                title: process.env.CHECK_NAME,
                summary,
                text: body || undefined
              }
            });
            core.setOutput("check-url", check.data.html_url);

      - name: Add PR comment
        if: ${{ env.HAS_REGRESSIONS == '1' || env.HAS_ALERTS == '1' }}
        uses: actions/github-script@v8
        env:
          HAS_REGRESSIONS: ${{ env.HAS_REGRESSIONS }}
          REPORT_URL: ${{ steps.publish_check.outputs.check-url }}
        with:
          script: |
            const { data } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.payload.workflow_run.head_repository.owner.login,
              repo: context.payload.workflow_run.head_repository.name,
              commit_sha: context.payload.workflow_run.head_sha,
            });
            if (!data || !data.length) {
              core.info('No associated PR; skipping comment.');
              return;
            }
            const title = (process.env.HAS_REGRESSIONS || '0') === '1'
              ? 'Launch Overhead Regression Detected' : 'Abnormal Launch Overhead Result';
            const comment = `**${title}** — [Report](${process.env.REPORT_URL})`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: data[0].number,
              body: comment
            });
